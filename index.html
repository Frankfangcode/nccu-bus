<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>政大校園公車 · Glassmorphism</title>
  <style>
    :root {
      --r1:    #A78BFA;
      --r2:    #60A5FA;
      --r3:    #34D399;
      --rh2:   #FBBF24;
      --rh3:   #22D3EE;
      --ok:    #34D399;
      --warn:  #FBBF24;
      --danger:#F87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── ANIMATED MESH BACKGROUND ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC',
                   'Microsoft JhengHei', sans-serif;
      min-height: 100vh;
      background: #0F0624;
      color: #E9D5FF;
      overflow-x: hidden;
      position: relative;
    }

    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .55;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .orb-1 { width:520px; height:520px; background:#5B21B6; top:-120px; left:-160px; animation-delay:0s; }
    .orb-2 { width:420px; height:420px; background:#1D4ED8; top:30%;  right:-100px; animation-delay:-5s; animation-duration:14s; }
    .orb-3 { width:360px; height:360px; background:#0E7490; bottom:-80px; left:30%; animation-delay:-9s; animation-duration:20s; }
    .orb-4 { width:280px; height:280px; background:#7C3AED; top:55%; left:-60px; animation-delay:-3s; animation-duration:16s; }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 60px) scale(1.08); }
    }

    /* ── GLASS MIXIN ── */
    .glass {
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 20px;
    }
    .glass-strong {
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,.22);
    }

    /* ── LAYOUT ── */
    #app {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 16px 14px 40px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 28px 20px 24px;
      margin-bottom: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 8px 32px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.15);
    }
    .hdr-logo {
      font-size: .78rem; letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(196,181,253,.7);
      margin-bottom: 4px;
    }
    .hdr-title {
      font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(135deg, #E9D5FF, #A78BFA, #7DD3FC);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .04em;
    }
    .clock {
      font-size: 3rem; font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: .04em;
      margin: 14px 0 4px;
      background: linear-gradient(135deg, #fff, #C4B5FD);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(167,139,250,.5));
    }
    .date-str { font-size: .82rem; color: rgba(196,181,253,.7); }
    .school-pill {
      display: inline-block; margin-top: 12px;
      padding: 5px 16px; border-radius: 999px;
      font-size: .76rem; font-weight: 700;
      letter-spacing: .04em;
    }
    .pill-on  {
      background: rgba(52,211,153,.15);
      border: 1px solid rgba(52,211,153,.4);
      color: #6EE7B7;
    }
    .pill-hol {
      background: rgba(251,191,36,.15);
      border: 1px solid rgba(251,191,36,.4);
      color: #FDE68A;
    }

    /* ── SECTION TITLE ── */
    .sec-title {
      display: flex; align-items: center; gap: 8px;
      font-size: .9rem; font-weight: 700;
      color: rgba(196,181,253,.9);
      margin: 22px 0 10px;
      letter-spacing: .04em;
    }
    .sec-title::after {
      content:''; flex:1; height:1px;
      background: linear-gradient(to right, rgba(167,139,250,.4), transparent);
    }

    /* ── TIP BOX ── */
    .tip-box {
      background: rgba(52,211,153,.08);
      border: 1px solid rgba(52,211,153,.25);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: .82rem;
      color: rgba(167,243,208,.9);
      line-height: 1.6;
      margin-bottom: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .tip-box.holiday {
      background: rgba(251,191,36,.08);
      border-color: rgba(251,191,36,.25);
      color: rgba(253,230,138,.9);
    }
    .tip-box strong { color: #6EE7B7; }
    .tip-box.holiday strong { color: #FDE68A; }

    /* ── BUS CARD ── */
    .bus-card {
      border-radius: 20px;
      margin-bottom: 12px;
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 4px 24px rgba(0,0,0,.25);
      overflow: hidden;
      transition: transform .18s, box-shadow .18s;
      position: relative;
    }
    .bus-card::before {
      content:'';
      position: absolute;
      top:0; left:0; right:0;
      height: 3px;
      border-radius: 20px 20px 0 0;
    }
    .bus-card.r1::before  { background: linear-gradient(90deg, #A78BFA, #7C3AED); }
    .bus-card.r2::before  { background: linear-gradient(90deg, #60A5FA, #2563EB); }
    .bus-card.r3::before  { background: linear-gradient(90deg, #34D399, #059669); }
    .bus-card.rh2::before { background: linear-gradient(90deg, #FBBF24, #D97706); }
    .bus-card.rh3::before { background: linear-gradient(90deg, #22D3EE, #0E7490); }
    .bus-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }
    .bus-card.next-up {
      border-color: rgba(251,191,36,.45);
      box-shadow: 0 0 0 1px rgba(251,191,36,.3), 0 6px 28px rgba(251,191,36,.15);
    }

    .card-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 16px 16px 10px;
    }
    .route-badge {
      display: inline-block;
      padding: 4px 11px; border-radius: 8px;
      font-size: .75rem; font-weight: 800;
      color: #fff;
      letter-spacing: .04em;
    }
    .route-name { font-size: .75rem; color: rgba(196,181,253,.6); margin-top: 5px; }
    .dep-block { text-align: right; }
    .dep-time {
      font-size: 2rem; font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .countdown {
      font-size: .74rem; color: rgba(196,181,253,.6); margin-top: 3px;
      font-variant-numeric: tabular-nums;
    }
    .cd-urgent { color: var(--danger); font-weight: 800; animation: pulse 1s infinite; }
    .cd-soon   { color: var(--warn);   font-weight: 700; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── STOP TIMELINE ── */
    .stops-wrap { padding: 0 16px 14px; }
    .stop-row { display:flex; align-items:stretch; gap:10px; }
    .stop-spine {
      display:flex; flex-direction:column; align-items:center;
      width:16px; flex-shrink:0;
    }
    .stop-dot {
      width:12px; height:12px; border-radius:50%;
      border:2px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.08);
      flex-shrink:0;
    }
    .dot-start { border-color:rgba(255,255,255,.5); background:rgba(255,255,255,.3); }
    .spine-line { flex:1; width:1px; background:rgba(255,255,255,.12); margin:2px 0; min-height:8px; }
    .stop-info {
      flex:1; display:flex; justify-content:space-between; align-items:center;
      padding: 1px 0 8px;
    }
    .stop-name-txt { font-size:.81rem; color: rgba(233,213,255,.85); }
    .stop-name-txt.bold { font-weight:700; color:#E9D5FF; }
    .stop-eta-txt { font-size:.75rem; color:rgba(196,181,253,.55); font-variant-numeric:tabular-nums; }

    /* ── NEXT BUS BANNER ── */
    .next-banner {
      background: rgba(251,191,36,.12);
      border: 1px solid rgba(251,191,36,.3);
      border-radius: 12px;
      padding: 8px 14px;
      font-size: .76rem;
      color: #FDE68A;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      letter-spacing: .02em;
    }

    /* ── TABS ── */
    .tab-bar {
      display:flex;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      padding: 5px;
      margin-bottom: 10px;
      gap: 4px;
    }
    .tab-btn {
      flex:1; padding:8px 4px; border:none; background:none;
      border-radius:10px; cursor:pointer;
      font-size:.83rem; font-weight:600;
      color: rgba(196,181,253,.6);
      transition: all .2s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, rgba(124,58,237,.7), rgba(109,40,217,.5));
      color:#E9D5FF; font-weight:800;
      box-shadow: 0 2px 12px rgba(124,58,237,.35);
      border: 1px solid rgba(167,139,250,.3);
    }

    /* ── INFO BOX ── */
    .info-box {
      background: rgba(96,165,250,.07);
      border: 1px solid rgba(96,165,250,.2);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: .79rem;
      color: rgba(186,230,253,.8);
      margin-bottom: 10px;
      line-height: 1.55;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* ── FULL SCHEDULE ── */
    .sched-card {
      border-radius: 16px;
      margin-bottom: 10px;
      overflow: hidden;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.1);
    }
    .sched-head {
      display:flex; align-items:center; gap:10px;
      padding:14px 16px; cursor:pointer; user-select:none;
      transition: background .2s;
    }
    .sched-head:hover { background: rgba(255,255,255,.05); }
    .sched-meta { flex:1; }
    .sched-dest { font-size:.86rem; font-weight:700; color:#E9D5FF; }
    .sched-hours { font-size:.72rem; color:rgba(196,181,253,.5); margin-top:2px; }
    .sched-toggle { font-size:.9rem; color:rgba(196,181,253,.5); transition:transform .2s; }
    .sched-toggle.open { transform:rotate(180deg); }
    .sched-body { padding:0 16px 14px; display:none; }
    .sched-body.open { display:block; }
    .sched-note {
      font-size:.75rem;
      color:rgba(196,181,253,.6);
      margin-bottom:8px;
      padding:7px 10px;
      background: rgba(255,255,255,.04);
      border-radius:8px;
      border: 1px solid rgba(255,255,255,.07);
      line-height:1.5;
    }
    .time-grid { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
    .t-chip {
      padding:4px 10px; border-radius:8px;
      font-size:.76rem; font-variant-numeric:tabular-nums;
      color: #C4B5FD;
      background: rgba(167,139,250,.12);
      border: 1px solid rgba(167,139,250,.2);
      transition: all .2s;
    }
    .t-chip.past { background:rgba(255,255,255,.04); color:rgba(196,181,253,.3); border-color:rgba(255,255,255,.06); }
    .t-chip.nxt  {
      background: linear-gradient(135deg, rgba(124,58,237,.7), rgba(109,40,217,.5));
      color:#fff; font-weight:800;
      border-color: rgba(167,139,250,.5);
      box-shadow: 0 2px 10px rgba(124,58,237,.35);
    }
    .t-chip.eve  { background:rgba(96,165,250,.1); color:#93C5FD; border-color:rgba(96,165,250,.2); }
    .t-chip-yellow {
      padding:4px 10px; border-radius:8px;
      font-size:.76rem; font-variant-numeric:tabular-nums;
      background: rgba(251,191,36,.12);
      color: #FDE68A;
      border: 1px solid rgba(251,191,36,.25);
    }
    .t-chip-yellow.nxt  {
      background: linear-gradient(135deg, rgba(217,119,6,.7), rgba(180,83,9,.5));
      color:#fff; font-weight:800;
      border-color:rgba(251,191,36,.5);
      box-shadow: 0 2px 10px rgba(217,119,6,.35);
    }
    .t-chip-yellow.past { background:rgba(255,255,255,.04); color:rgba(196,181,253,.3); border-color:rgba(255,255,255,.06); }

    /* ── ROUTE LEGEND ── */
    .legend {
      border-radius: 16px;
      margin-bottom: 10px;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.1);
      padding: 14px 16px;
    }
    .leg-row {
      display:flex; align-items:flex-start; gap:10px;
      margin-bottom:12px; padding-bottom:12px;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .leg-row:last-child { margin:0; padding:0; border:none; }
    .leg-badge {
      padding:4px 10px; border-radius:8px;
      font-size:.73rem; font-weight:800; color:#fff; white-space:nowrap;
    }
    .leg-info { font-size:.79rem; color:rgba(233,213,255,.75); line-height:1.55; }
    .leg-stops { font-size:.73rem; color:rgba(196,181,253,.45); margin-top:2px; }

    /* ── NO SERVICE ── */
    .no-svc {
      text-align:center; padding:52px 20px;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      color: rgba(196,181,253,.6);
    }
    .no-svc .emoji { font-size:3rem; }
    .no-svc .ttl { font-size:1.1rem; font-weight:700; color:#E9D5FF; margin:12px 0 6px; }
    .no-svc .sub { font-size:.83rem; }

    /* ── FOOTER ── */
    footer {
      text-align:center; padding:28px 16px;
      color:rgba(196,181,253,.35); font-size:.73rem; line-height:1.9;
    }

    /* ── DIVIDER IN DOWNHILL CARD ── */
    .term-banner-glass {
      display:flex; align-items:center; gap:8px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 10px;
      font-size: .79rem;
      color: rgba(233,213,255,.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
  </style>
</head>

// ─────────────────────────────────────────────
//  DEPARTURE TIME GENERATION
// ─────────────────────────────────────────────
function genR1() {
  const peaks = [
    [7*60+45, 8*60+15],  [8*60+45, 9*60+15],
    [9*60+45,10*60+15],  [10*60+45,11*60+15],
    [11*60+45,12*60+15], [12*60+45,13*60+15],
    [13*60+45,14*60+15], [14*60+45,15*60+15],
    [15*60+45,16*60+15], [16*60+45,17*60+15],
  ];
  const inPeak = t => peaks.some(([s,e]) => t>=s && t<e);
  const out = [];
  let t = 7*60+30;
  while (t <= 17*60+55) { out.push(t); t += inPeak(t) ? 5 : 8; }
  return out;
}
function genR2() {
  return [
    7*60+30, 7*60+50,
    8*60+20, 8*60+40,
    9*60+20, 9*60+50,
    10*60+20,10*60+50,
    11*60+20,11*60+50,
    12*60+20,
    13*60+20,13*60+50,
    14*60+20,14*60+50,
    15*60+20,15*60+50,
    16*60+20,16*60+50,
    17*60+20,17*60+50,
    18*60+10,
    19*60+10,
    20*60+10,
    21*60+30,
  ];
}
function genR3() {
  const fixed = [
    8*60+10,
    9*60+30,
    10*60+10,10*60+30,
    11*60+10,11*60+30,
    12*60+10,
    13*60+10,13*60+30,
    14*60+10,14*60+30,
    15*60+10,15*60+30,
    16*60+30,
    17*60+10,17*60+30,
  ];
  const eve8=[],eve10=[],eve15=[];
  for (let t=18*60; t<19*60;  t+=8 ) eve8.push(t);
  for (let t=19*60; t<20*60;  t+=10) eve10.push(t);
  for (let t=20*60; t<=23*60; t+=15) eve15.push(t);
  return [...new Set([...fixed,...eve8,...eve10,...eve15])].sort((a,b)=>a-b);
}
function genHoliday() {
  return [
    8*60,     8*60+20,  8*60+40,
    9*60,     9*60+20,  9*60+40,
    10*60,    10*60+20, 10*60+40, 11*60, 11*60+20,
    12*60,    12*60+20, 12*60+40,
    13*60,    13*60+20, 13*60+40,
    14*60,    14*60+20, 14*60+40,
    15*60,    15*60+20, 15*60+40,
    16*60,    16*60+20, 16*60+40, 17*60, 17*60+20,
    18*60,    18*60+20, 18*60+40,
    19*60,    19*60+20, 19*60+40,
    20*60,    20*60+20, 20*60+40,
    21*60,    21*60+20, 21*60+40,
    22*60,    22*60+15, 22*60+30, 22*60+45, 23*60,
  ];
}
function isHolidayYellow(t) { return t % 60 === 0 && t >= 8*60 && t <= 18*60; }
const ALL_HOLIDAY = genHoliday();
const DEPARTURES = {
  r1:  genR1(),
  r2:  genR2(),
  r3:  genR3(),
  rh2: ALL_HOLIDAY.filter(t =>  isHolidayYellow(t)),
  rh3: ALL_HOLIDAY.filter(t => !isHolidayYellow(t)),
};
const R3_EVENING_START = 18*60;

// ─────────────────────────────────────────────
//  TIME UTILITIES
// ─────────────────────────────────────────────
function getTW() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset()*60000;
  return new Date(utc + 8*3600000);
}
function toMin(tw) { return tw.getHours()*60 + tw.getMinutes(); }
function fmt(m) {
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}
function isWeekday(tw) { const d=tw.getDay(); return d>=1&&d<=5; }
function fmtDate(tw) {
  const days=['日','一','二','三','四','五','六'];
  return `${tw.getFullYear()}年${tw.getMonth()+1}月${tw.getDate()}日　星期${days[tw.getDay()]}`;
}
function cdClass(diff) {
  if (diff<=2) return 'cd-urgent';
  if (diff<=8) return 'cd-soon';
  return '';
}
function cdText(diff) {
  if (diff<=0) return '⚡ 即將發車';
  return `${diff} 分鐘後發車`;
}

// ─────────────────────────────────────────────
//  RENDER HELPERS
// ─────────────────────────────────────────────
function renderStops(stops, depMin, r) {
  return stops.map((s, i) => {
    const isFirst = i===0, isLast = i===stops.length-1;
    const etaMin = depMin + s.off;
    const dotCls = isFirst ? 'stop-dot dot-start' : 'stop-dot';
    const dotStyle = isLast
      ? `style="border-color:${r.color};background:${r.color};opacity:.7"`
      : '';
    const lineHtml = isLast ? '' : '<div class="spine-line"></div>';
    const bold = isLast ? ' bold' : '';
    return `
      <div class="stop-row">
        <div class="stop-spine">
          <div class="${dotCls}" ${dotStyle}></div>
          ${lineHtml}
        </div>
        <div class="stop-info">
          <span class="stop-name-txt${bold}">${s.name}</span>
          <span class="stop-eta-txt">${fmt(etaMin)}</span>
        </div>
      </div>`;
  }).join('');
}

function busCard(routeId, depMin, curMin, isNextBus) {
  const r = ROUTES[routeId];
  const diff = depMin - curMin;
  const nextCls = isNextBus ? ' next-up' : '';
  return `
    <div class="bus-card ${routeId}${nextCls}">
      <div class="card-top">
        <div>
          <span class="route-badge" style="background:${r.badgeBg}">${r.badge}</span>
          <div class="route-name">往 ${r.dest}</div>
        </div>
        <div class="dep-block">
          <div class="dep-time" style="color:${r.color}">${fmt(depMin)}</div>
          <div class="countdown ${cdClass(diff)}">${cdText(diff)}</div>
        </div>
      </div>
      <div class="stops-wrap">
        ${renderStops(r.stops, depMin, r)}
      </div>
    </div>`;
}

function renderUpcoming(curMin, routeIds) {
  routeIds = routeIds || ['r1','r2','r3'];
  const all = [];
  routeIds.forEach(id => {
    const r = ROUTES[id];
    DEPARTURES[id].filter(t => t>=curMin && t<=r.svcEnd)
      .slice(0, 3)
      .forEach(t => all.push({ id, t }));
  });
  all.sort((a,b)=>a.t-b.t);
  const shown = all.slice(0, 6);

  if (!shown.length) return `
    <div class="no-svc">
      <div class="emoji">🌙</div>
      <div class="ttl">今日班次已結束</div>
      <div class="sub">公車服務結束，明天上課日再見！</div>
    </div>`;

  const firstT = shown[0].t;
  const diff0  = firstT - curMin;
  const bannerHtml = `
    <div class="next-banner">
      🔔 下一班：${ROUTES[shown[0].id].badge} ${fmt(firstT)}
      ${diff0<=0 ? '（即將發車！）' : `· 還有 ${diff0} 分鐘`}
    </div>`;

  return bannerHtml + shown.map((b, i) =>
    busCard(b.id, b.t, curMin, i===0)
  ).join('');
}

function renderDownhill(curMin, selectedStop, routeIds) {
  routeIds = routeIds || ['r1','r2','r3'];
  const buses = [];
  routeIds.forEach(id => {
    const r = ROUTES[id];
    if (r.downAt[selectedStop] === undefined) return;
    DEPARTURES[id].filter(depT => depT <= r.svcEnd).forEach(depT => {
      const terminusDepT = depT + r.terminusDepOff;
      const passT        = depT + r.downAt[selectedStop];
      if (passT >= curMin) {
        buses.push({ id, r, depT, terminusDepT, passT });
      }
    });
  });
  buses.sort((a,b) => a.passT - b.passT);
  const shown = buses.slice(0, 5);

  if (!shown.length) return `
    <div style="text-align:center;padding:24px;color:rgba(196,181,253,.4);font-size:.85rem">
      目前無下山班次估算資料
    </div>`;

  return shown.map(b => {
    const diff = b.passT - curMin;
    const isSameTerminus = (b.r.terminus === selectedStop);

    const stopsHtml = b.r.returnStops.map((s, i) => {
      const isFirst = i === 0;
      const isLast  = i === b.r.returnStops.length - 1;
      const isHere  = s.name === selectedStop;
      const etaMin  = b.terminusDepT + s.off;
      const dotCls  = isFirst ? 'stop-dot dot-start' : 'stop-dot';
      const dotStyle = isLast
        ? `style="border-color:${b.r.color};background:${b.r.color};opacity:.7"`
        : isHere
          ? `style="border-color:${b.r.color};background:${b.r.color};box-shadow:0 0 0 3px ${b.r.color}44"`
          : '';
      const lineHtml = isLast ? '' : '<div class="spine-line"></div>';
      const hereTag  = isHere && !isSameTerminus
        ? `<span style="font-size:.66rem;background:${b.r.badgeBg};color:#fff;
                        border-radius:4px;padding:1px 6px;margin-left:5px;vertical-align:middle">
             你在這
           </span>`
        : '';
      const nameBold = (isHere || isLast) ? ' bold' : '';
      return `
        <div class="stop-row">
          <div class="stop-spine">
            <div class="${dotCls}" ${dotStyle}></div>
            ${lineHtml}
          </div>
          <div class="stop-info">
            <span class="stop-name-txt${nameBold}">${s.name}${hereTag}</span>
            <span class="stop-eta-txt" style="${isHere?`color:${b.r.color};font-weight:700`:''}">${fmt(etaMin)}</span>
          </div>
        </div>`;
    }).join('');

    const termBanner = `
      <div class="term-banner-glass">
        <span style="font-size:1rem">🏁</span>
        <span>從 <strong style="color:#E9D5FF">${b.r.terminus}</strong>
          <span style="color:${b.r.color};font-weight:800;margin-left:4px">${fmt(b.terminusDepT)}</span>
          出發返回
        </span>
      </div>`;

    return `
      <div class="bus-card ${b.id}">
        <div class="card-top">
          <div>
            <span class="route-badge" style="background:${b.r.badgeBg}">${b.r.badge}</span>
            <div class="route-name">⬇️ 返程下山 · 往行政大樓</div>
          </div>
          <div class="dep-block">
            <div class="dep-time" style="color:${b.r.color}">${fmt(b.passT)}</div>
            <div class="countdown ${cdClass(diff)}">
              ${diff<=0 ? '⚡ 即將抵達' : `${diff} 分鐘後抵達`}
            </div>
          </div>
        </div>
        <div class="stops-wrap">
          ${termBanner}
          ${stopsHtml}
        </div>
        <div style="font-size:.68rem;color:rgba(196,181,253,.35);padding:0 16px 10px;
                    border-top:1px solid rgba(255,255,255,.05);padding-top:8px;margin-top:2px">
          ⏱ 依 ${fmt(b.depT)} 行政大樓發車 → ${b.r.terminus} ${fmt(b.terminusDepT)} 出發返回（估算）
        </div>
      </div>`;
  }).join('');
}

function renderFullSchedule(curMin) {
  return ['r1','r2','r3'].map(id => {
    const r = ROUTES[id];
    const times = DEPARTURES[id];
    const chipsHtml = times.map(t => {
      let cls = 't-chip';
      if (t < curMin - 3)                cls += ' past';
      else if (t>=curMin && t<=curMin+2) cls += ' nxt';
      else if (id==='r3' && t>=R3_EVENING_START) cls += ' eve';
      return `<span class="${cls}">${fmt(t)}</span>`;
    }).join('');
    return `
      <div class="sched-card">
        <div class="sched-head" onclick="togSched('${id}')">
          <span class="route-badge" style="background:${r.badgeBg}">${r.badge}</span>
          <div class="sched-meta">
            <div class="sched-dest">往 ${r.dest}</div>
            <div class="sched-hours">${r.svcHours}</div>
          </div>
          <span class="sched-toggle" id="tog-${id}">▼</span>
        </div>
        <div class="sched-body" id="body-${id}">
          <div class="sched-note">${r.note}</div>
          <div class="time-grid">${chipsHtml}</div>
          ${id==='r3'?'<div style="margin-top:8px;font-size:.72rem;color:rgba(147,197,253,.5)">🟦 藍色 = 晚間密集班次</div>':''}
        </div>
      </div>`;
  }).join('');
}

function renderHolidaySchedule(curMin) {
  const chipsHtml = ALL_HOLIDAY.map(t => {
    const isYellow = isHolidayYellow(t);
    let cls = isYellow ? 't-chip t-chip-yellow' : 't-chip';
    if (t < curMin - 3)               cls += ' past';
    else if (t>=curMin && t<=curMin+2) cls = (isYellow?'t-chip-yellow':'t-chip') + ' nxt';
    const suffix = isYellow ? ' ★' : '';
    return `<span class="${cls}" title="${isYellow?'黃底班次：往六期運動場':'往山居學習中心'}">${fmt(t)}${suffix}</span>`;
  }).join('');
  return `
    <div class="sched-card">
      <div class="sched-head" onclick="togSched('holiday')">
        <span class="route-badge" style="background:linear-gradient(135deg,#0E7490,#155E75)">假日公車</span>
        <div class="sched-meta">
          <div class="sched-dest">行政大樓出發完整班次</div>

}

      ${renderLegend()}
    `;
  }
}

function togSched(id) {
  document.getElementById(`body-${id}`).classList.toggle('open');
  document.getElementById(`tog-${id}`).classList.toggle('open');
}

function selStop(stop) {
  selDownStop = stop;
  const tw  = getTW();
  const rIds = !isWeekday(tw) ? ['rh2','rh3'] : ['r1','r2','r3'];
  document.getElementById('downhill-wrap').innerHTML = renderDownhill(toMin(tw), stop, rIds);
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === stop);
  });
}

// ── BOOT ──
render();
setInterval(() => {
  const tw = getTW();
  const hh = String(tw.getHours()).padStart(2,'0');
  const mm = String(tw.getMinutes()).padStart(2,'0');
  const ss = String(tw.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
}, 1000);
setInterval(() => { initRender = true; render(); }, 60000);
</script>
</body>
</html>
