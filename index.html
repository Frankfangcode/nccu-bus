<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --nccu:       #4C1D95;
      --nccu-light: #7C3AED;
      --r1:         #7C3AED;
      --r2:         #1D4ED8;
      --r3:         #0369A1;
      --ok:         #059669;
      --warn:       #D97706;
      --danger:     #DC2626;
      --bg:         #F5F3FF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC',
                   'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: #1E1B4B;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(140deg, #1E0A4C 0%, #3B0D82 50%, #5B21B6 100%);
      color: #fff;
      padding: 20px 16px 28px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(76,29,149,.45);
    }
    .header-logo { font-size: .85rem; letter-spacing:.12em; opacity:.75; margin-bottom:4px; }
    .header-title { font-size: 1.35rem; font-weight: 800; letter-spacing:.04em; }
    .clock {
      font-size: 2.8rem; font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: .02em;
      margin: 10px 0 4px;
      text-shadow: 0 0 20px rgba(167,139,250,.6);
    }
    .date-str { font-size: .85rem; opacity: .8; }
    .school-pill {
      display: inline-block; margin-top: 10px;
      padding: 4px 14px; border-radius: 999px;
      font-size: .78rem; font-weight: 700;
      letter-spacing:.04em;
    }
    .pill-on  { background:rgba(52,211,153,.2); border:1px solid rgba(52,211,153,.5); color:#A7F3D0; }
    .pill-off { background:rgba(239,68,68,.2);  border:1px solid rgba(239,68,68,.5);  color:#FCA5A5; }

    /* ===== LAYOUT ===== */
    main { max-width: 640px; margin: 0 auto; padding: 16px; }

    .sec-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 1rem; font-weight: 700; color: #4C1D95;
      margin: 22px 0 12px;
    }
    .sec-title::after {
      content:''; flex:1; height:2px;
      background: linear-gradient(to right, #DDD6FE, transparent);
    }

    /* ===== TIP BOX ===== */
    .tip-box {
      background: #ECFDF5; border:1px solid #6EE7B7;
      border-radius: 12px; padding: 12px 14px;
      font-size: .84rem; color: #065F46; line-height:1.55;
      margin-bottom: 18px;
    }
    .tip-box strong { color: #047857; }

    /* ===== BUS CARD ===== */
    .bus-card {
      background: #fff; border-radius: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(76,29,149,.09);
      border-left: 5px solid #ccc;
      overflow: hidden;
      transition: transform .15s;
    }
    .bus-card:hover { transform: translateY(-2px); }
    .bus-card.r1  { border-left-color: var(--r1); }
    .bus-card.r2  { border-left-color: var(--r2); }
    .bus-card.r3  { border-left-color: var(--r3); }
    .bus-card.rh2 { border-left-color: #B45309; }   /* holiday – 六期 (amber) */
    .bus-card.rh3 { border-left-color: #0E7490; }   /* holiday – 山居 (teal)  */
    .bus-card.next-up { box-shadow: 0 0 0 2px var(--warn), 0 4px 16px rgba(217,119,6,.25); }

    .card-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 14px 10px;
    }
    .route-badge {
      display: inline-block; padding: 3px 10px; border-radius: 8px;
      font-size: .78rem; font-weight: 800; color: #fff;
    }
    .route-name { font-size: .78rem; color: #6B7280; margin-top: 3px; }
    .dep-block { text-align: right; }
    .dep-time {
      font-size: 2rem; font-weight: 900;
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .countdown {
      font-size: .78rem; color: #6B7280; margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }
    .cd-urgent { color: var(--danger); font-weight: 800; animation: pulse 1s infinite; }
    .cd-soon   { color: var(--warn);   font-weight: 700; }

    .stop-row { display: flex; align-items: stretch; gap: 10px; }
    .stop-spine {
      display: flex; flex-direction: column; align-items: center;
      width: 16px; flex-shrink: 0;
    }
    .stop-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 3px solid #D1D5DB; background: #fff; flex-shrink:0;

    .dot-start { border-color:#9CA3AF; background:#9CA3AF; }

    .stop-info {

    footer {
      text-align:center; padding:28px 16px;
      color:#9CA3AF; font-size:.75rem; line-height:1.8;
    }
  </style>
</head>

// ─────────────────────────────────────────────
//  DEPARTURE TIME GENERATION
// ─────────────────────────────────────────────
function genR1() {
  // Peak windows (5-min interval); off-peak 8-min
  const peaks = [
    [7*60+45, 8*60+15],  [8*60+45, 9*60+15],
    [9*60+45,10*60+15],  [10*60+45,11*60+15],
    [11*60+45,12*60+15], [12*60+45,13*60+15],
    [13*60+45,14*60+15], [14*60+45,15*60+15],
    [15*60+45,16*60+15], [16*60+45,17*60+15],
  ];
  const inPeak = t => peaks.some(([s,e]) => t>=s && t<e);
  const out = [];
  let t = 7*60+30;
  while (t <= 17*60+55) { out.push(t); t += inPeak(t) ? 5 : 8; }
  return out;
}

function genR2() {
  return [
    7*60+30, 7*60+50,
    8*60+20, 8*60+40,
    9*60+20, 9*60+50,
    10*60+20,10*60+50,
    11*60+20,11*60+50,
    12*60+20,
    13*60+20,13*60+50,
    14*60+20,14*60+50,
    15*60+20,15*60+50,
    16*60+20,16*60+50,
    17*60+20,17*60+50,
    18*60+10,
    19*60+10,
    20*60+10,
    21*60+30,
  ];
}

function genR3() {
  const fixed = [
    8*60+10,
    9*60+30,
    10*60+10,10*60+30,
    11*60+10,11*60+30,
    12*60+10,
    13*60+10,13*60+30,
    14*60+10,14*60+30,
    15*60+10,15*60+30,
    16*60+30,
    17*60+10,17*60+30,
  ];
  // 18:00–19:00 每8分
  const eve8=[], eve10=[], eve15=[];
  for (let t=18*60;   t<19*60;    t+=8 ) eve8.push(t);
  for (let t=19*60;   t<20*60;    t+=10) eve10.push(t);
  for (let t=20*60;   t<=23*60;   t+=15) eve15.push(t);
  return [...new Set([...fixed,...eve8,...eve10,...eve15])].sort((a,b)=>a-b);
}

// ── Holiday helpers must be defined BEFORE DEPARTURES ──
function genHoliday() {
  return [
    8*60,     8*60+20,  8*60+40,
    9*60,     9*60+20,  9*60+40,
    10*60,    10*60+20, 10*60+40, 11*60, 11*60+20,
    12*60,    12*60+20, 12*60+40,
    13*60,    13*60+20, 13*60+40,
    14*60,    14*60+20, 14*60+40,
    15*60,    15*60+20, 15*60+40,
    16*60,    16*60+20, 16*60+40, 17*60, 17*60+20,
    18*60,    18*60+20, 18*60+40,
    19*60,    19*60+20, 19*60+40,
    20*60,    20*60+20, 20*60+40,
    21*60,    21*60+20, 21*60+40,
    22*60,    22*60+15, 22*60+30, 22*60+45, 23*60,
  ];
}
// 黃底（六期）= 整點 08:00~18:00；其餘均為一般班（山居）
function isHolidayYellow(t) { return t % 60 === 0 && t >= 8*60 && t <= 18*60; }
const ALL_HOLIDAY = genHoliday();

const DEPARTURES = {
  r1:  genR1(),
  r2:  genR2(),
  r3:  genR3(),
  rh2: ALL_HOLIDAY.filter(t =>  isHolidayYellow(t)),  // 黃底 → 六期
  rh3: ALL_HOLIDAY.filter(t => !isHolidayYellow(t)),  // 一般 → 山居
};

// Mark evening interval times for display
const R3_EVENING_START = 18*60;

// ─────────────────────────────────────────────
//  TIME UTILITIES
// ─────────────────────────────────────────────
function getTW() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset()*60000;
  return new Date(utc + 8*3600000);
}
function toMin(tw) { return tw.getHours()*60 + tw.getMinutes(); }
function fmt(m) {
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}
function isWeekday(tw) { const d=tw.getDay(); return d>=1&&d<=5; }
function fmtDate(tw) {
  const days=['日','一','二','三','四','五','六'];
  return `${tw.getFullYear()}年${tw.getMonth()+1}月${tw.getDate()}日　星期${days[tw.getDay()]}`;
}
function cdClass(diff) {
  if (diff<=2) return 'cd-urgent';
  if (diff<=8) return 'cd-soon';
  return '';
}
function cdText(diff) {
  if (diff<=0) return '⚡ 即將發車';
  return `${diff} 分鐘後發車`;
}

// ─────────────────────────────────────────────
//  RENDER HELPERS
// ─────────────────────────────────────────────
function renderStops(stops, depMin, routeColor) {
  return stops.map((s, i) => {
    const isFirst = i===0, isLast = i===stops.length-1;
    const etaMin = depMin + s.off;
    const dotCls = isFirst ? 'stop-dot dot-start'
                 : isLast  ? 'stop-dot dot-end'
                 : 'stop-dot';
    const dotStyle = isLast ? `style="border-color:${routeColor};color:${routeColor}"` : '';
    const lineHtml = isLast ? '' : '<div class="spine-line"></div>';
    const bold = isLast ? ' bold' : '';
    return `
      <div class="stop-row">
        <div class="stop-spine">
          <div class="${dotCls}" ${dotStyle}></div>
          ${lineHtml}
        </div>
        <div class="stop-info">
          <span class="stop-name-txt${bold}">${s.name}</span>
          <span class="stop-eta-txt">${fmt(etaMin)}</span>
        </div>
      </div>`;
  }).join('');
}

function busCard(routeId, depMin, curMin, isNextBus) {
  const r = ROUTES[routeId];
  const diff = depMin - curMin;
  const rNum = routeId.slice(1); // '1','2','3'
  const nextCls = isNextBus ? ' next-up' : '';
  return `
    <div class="bus-card ${routeId}${nextCls}">
      <div class="card-top">
        <div>
          <span class="route-badge" style="background:${r.color}">${r.badge}</span>
          <div class="route-name">往 ${r.dest}</div>
        </div>
        <div class="dep-block">
          <div class="dep-time" style="color:${r.color}">${fmt(depMin)}</div>
          <div class="countdown ${cdClass(diff)}">${cdText(diff)}</div>
        </div>
      </div>
      <div class="stops-wrap">
        ${renderStops(r.stops, depMin, r.color)}
      </div>
    </div>`;
}

function renderUpcoming(curMin, routeIds) {
  routeIds = routeIds || ['r1','r2','r3'];
  const all = [];
  routeIds.forEach(id => {
    const r = ROUTES[id];
    DEPARTURES[id].filter(t => t>=curMin && t<=r.svcEnd)
      .slice(0, 3)
      .forEach(t => all.push({ id, t }));
  });
  all.sort((a,b)=>a.t-b.t);
  const shown = all.slice(0, 6);

  if (!shown.length) return `
    <div class="no-svc">
      <div class="emoji">🌙</div>
      <div class="ttl">今日班次已結束</div>
      <div class="sub">公車服務結束，明天上課日再見！</div>
    </div>`;

  const firstT = shown[0].t;
  const diff0  = firstT - curMin;
  const bannerHtml = `
    <div class="next-banner">
      🔔 下一班：${ROUTES[shown[0].id].badge} ${fmt(firstT)}
      ${diff0<=0 ? '（即將發車！）' : `· 還有 ${diff0} 分鐘`}
    </div>`;

  return bannerHtml + shown.map((b, i) =>
    busCard(b.id, b.t, curMin, i===0)
  ).join('');
}

function renderDownhill(curMin, selectedStop, routeIds) {
  routeIds = routeIds || ['r1','r2','r3'];
  // Collect all upcoming return trips that serve selectedStop
  const buses = [];
  routeIds.forEach(id => {
    const r = ROUTES[id];
    if (r.downAt[selectedStop] === undefined) return; // route doesn't serve this stop on return
    DEPARTURES[id].filter(depT => depT <= r.svcEnd).forEach(depT => {
      const terminusDepT = depT + r.terminusDepOff;  // when bus departs terminus going down
      const passT        = depT + r.downAt[selectedStop]; // when bus passes selectedStop
      if (passT >= curMin) {
        buses.push({ id, r, depT, terminusDepT, passT });
      }
    });
  });
  buses.sort((a,b) => a.passT - b.passT);
  const shown = buses.slice(0, 5);

  if (!shown.length) return `
    <div style="text-align:center;padding:24px;color:#9CA3AF;font-size:.85rem">
      目前無下山班次估算資料
    </div>`;

  return shown.map(b => {
    const diff = b.passT - curMin;
    const isSameTerminus = (b.r.terminus === selectedStop);

    // Build full return route stop list
    const stopsHtml = b.r.returnStops.map((s, i) => {
      const isFirst = i === 0;
      const isLast  = i === b.r.returnStops.length - 1;
      const isHere  = s.name === selectedStop;  // the stop the user is at
      const etaMin  = b.terminusDepT + s.off;

      const dotCls = isFirst ? 'stop-dot dot-start'
                   : isLast  ? 'stop-dot dot-end'
                   : 'stop-dot';
      const dotStyle = isLast ? `style="border-color:${b.r.color};color:${b.r.color}"` : '';
      const lineHtml = isLast ? '' : '<div class="spine-line"></div>';

      // Highlight the "you are here" stop
      const hereTag = isHere && !isSameTerminus
        ? `<span style="font-size:.68rem;background:${b.r.color};color:#fff;
                        border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle">
             你在這
           </span>`
        : '';

      const nameBold = (isHere || isLast) ? ' bold' : '';

      return `
        <div class="stop-row">
          <div class="stop-spine">
            <div class="${dotCls}"
              ${dotStyle}
              ${isHere ? `style="border-color:${b.r.color};background:${b.r.color};
                                 box-shadow:0 0 0 3px ${b.r.color}33"` : ''}
            ></div>
            ${lineHtml}
          </div>
          <div class="stop-info">
            <span class="stop-name-txt${nameBold}">${s.name}${hereTag}</span>
            <span class="stop-eta-txt" style="${isHere?`color:${b.r.color};font-weight:700`:''}">${fmt(etaMin)}</span>
          </div>
        </div>`;
    }).join('');

    // Terminus departure banner
    const termBanner = `
      <div style="display:flex;align-items:center;gap:8px;
                  background:#F9FAFB;border-radius:8px;
                  padding:7px 10px;margin-bottom:10px;font-size:.8rem;color:#374151">
        <span style="font-size:1rem">🏁</span>
        <span>從 <strong>${b.r.terminus}</strong>
          <span style="color:${b.r.color};font-weight:800;margin-left:3px">${fmt(b.terminusDepT)}</span>
          出發返回
        </span>
      </div>`;

    return `
      <div class="bus-card ${b.id}">
        <div class="card-top">
          <div>
            <span class="route-badge" style="background:${b.r.color}">${b.r.badge}</span>
            <div class="route-name">⬇️ 返程下山 · 往行政大樓</div>
          </div>
          <div class="dep-block">
            <div class="dep-time" style="color:${b.r.color}">${fmt(b.passT)}</div>
            <div class="countdown ${cdClass(diff)}">
              ${diff<=0 ? '⚡ 即將抵達' : `${diff} 分鐘後抵達`}
            </div>
          </div>
        </div>
        <div class="stops-wrap">
          ${termBanner}
          ${stopsHtml}
        </div>
        <div style="font-size:.7rem;color:#9CA3AF;padding:0 14px 10px;
                    border-top:1px solid #F3F4F6;padding-top:8px;margin-top:2px">
          ⏱ 依 ${fmt(b.depT)} 行政大樓發車 → ${b.r.terminus} ${fmt(b.terminusDepT)} 出發返回（估算）
        </div>
      </div>`;
  }).join('');
}

// Full schedule for weekdays (three accordion cards)
function renderFullSchedule(curMin) {
  return ['r1','r2','r3'].map(id => {
    const r = ROUTES[id];
    const times = DEPARTURES[id];
    const chipsHtml = times.map(t => {
      let cls = 't-chip';
      if (t < curMin - 3)              cls += ' past';
      else if (t>=curMin && t<=curMin+2) cls += ' nxt';
      else if (id==='r3' && t>=R3_EVENING_START) cls += ' eve';
      return `<span class="${cls}">${fmt(t)}</span>`;
    }).join('');

    return `
      <div class="sched-card">
        <div class="sched-head" onclick="togSched('${id}')">
          <span class="route-badge" style="background:${r.color}">${r.badge}</span>
          <div class="sched-meta">
            <div class="sched-dest">往 ${r.dest}</div>
            <div class="sched-hours">${r.svcHours}</div>
          </div>
          <span class="sched-toggle" id="tog-${id}">▼</span>
        </div>
        <div class="sched-body" id="body-${id}">
          <div class="sched-note">${r.note}</div>
          <div class="time-grid">${chipsHtml}</div>
          ${id==='r3'?'<div style="margin-top:8px;font-size:.72rem;color:#9CA3AF">🟦 藍色 = 晚間密集班次</div>':''}
        </div>
      </div>`;
  }).join('');
}

// Combined holiday schedule — single accordion, yellow buses highlighted
function renderHolidaySchedule(curMin) {
  const chipsHtml = ALL_HOLIDAY.map(t => {
    const isYellow = isHolidayYellow(t);
    let cls = isYellow ? 't-chip t-chip-yellow' : 't-chip';
    if (t < curMin - 3)               cls += ' past';
    else if (t >= curMin && t <= curMin+2) cls = (isYellow ? 't-chip-yellow' : 't-chip') + ' nxt';
    const suffix = isYellow ? ' ★' : '';
    return `<span class="${cls}" title="${isYellow?'黃底班次：往六期運動場':'往山居學習中心'}">${fmt(t)}${suffix}</span>`;
  }).join('');

  return `
    <div class="sched-card">
      <div class="sched-head" onclick="togSched('holiday')">
        <span class="route-badge" style="background:#0E7490">假日公車</span>
        <div class="sched-meta">
          <div class="sched-dest">行政大樓出發完整班次</div>
          <div class="sched-hours">週六、日及國定假日 08:00 – 23:00</div>
        </div>
        <span class="sched-toggle" id="tog-holiday">▼</span>
      </div>
      <div class="sched-body" id="body-holiday">
        <div class="sched-note">
          🟨 <strong>黃底★</strong>：整點班次（08:00–18:00），延伸至六期運動場<br>
          ⬜ 其餘班次：至山居學習中心後返回
        </div>
        <div class="time-grid">${chipsHtml}</div>
      </div>
    </div>`;
}

function renderHolidayLegend() {
  return `
    <div class="legend">
      <div class="leg-row">
        <span class="leg-badge" style="background:#B45309">假日公車★</span>
        <div class="leg-info">
          <div>行政大樓 → 百年樓 → 藝文中心 → 好漢坡 → 自強一二三舍 → 山居學習中心 → 自強十舍 → 研創中心 → 六期運動場</div>
          <div class="leg-stops">整點發車 08:00–18:00 ｜ 返程不經山居學習中心、自強十舍</div>
        </div>
      </div>
      <div class="leg-row">
        <span class="leg-badge" style="background:#0E7490">假日公車</span>
        <div class="leg-info">
          <div>行政大樓 → 百年樓 → 藝文中心 → 好漢坡 → 自強一二三舍 → 山居學習中心</div>
          <div class="leg-stops">非整點班次 08:20–23:00 ｜ 假日公車服務：週六、日及國定假日</div>
        </div>
      </div>
    </div>`;
}

function renderLegend() {
  return `
    <div class="legend">
      ${['r1','r2','r3'].map(id => {
        const r = ROUTES[id];
        return `
          <div class="leg-row">
            <span class="leg-badge" style="background:${r.color}">${r.badge}</span>
            <div class="leg-info">
              <div>${r.routeDesc}</div>
              <div class="leg-stops">${r.svcHours} ｜ ${r.note}</div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

// ─────────────────────────────────────────────
//  STATE & MAIN RENDER
// ─────────────────────────────────────────────
let selDownStop = '好漢坡';
let initRender  = true;

function render() {
  const tw    = getTW();
  const curMin= toMin(tw);

  // Clock
  const hh = String(tw.getHours()).padStart(2,'0');
  const mm = String(tw.getMinutes()).padStart(2,'0');
  const ss = String(tw.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
  document.getElementById('date-str').textContent = fmtDate(tw);

  // Header pill
  const pill = document.getElementById('school-pill');
  const weekend = !isWeekday(tw);
  if (!weekend) {
    pill.className='school-pill pill-on';
    pill.textContent='✓ 上課日　平日公車服務中';
  } else {
    pill.className='school-pill pill-on';
    pill.textContent='🌟 假日公車服務中　08:00–23:00';
  }

  // Main content (re-render every 60s, or first load)
  if (!initRender) return;
  initRender = false;

  const main = document.getElementById('main');
  const HOLIDAY_ROUTES = ['rh2','rh3'];

  if (weekend) {
    // ── HOLIDAY LAYOUT ──
    main.innerHTML = `
      <div class="tip-box" style="background:#FFFBEB;border-color:#FCD34D;color:#78350F">
        🌟 <strong>今日為假日班表（週六/日/國定假日）</strong><br>
        &nbsp;&nbsp;&nbsp;★ 整點班次（08:00–18:00）延伸至六期運動場，其餘至山居學習中心。<br>
        &nbsp;&nbsp;&nbsp;建議在發車時間<strong>前即抵達候車</strong>，以免錯過班次。<br>
        &nbsp;&nbsp;&nbsp;行政大樓→山居約 <strong>5 分鐘</strong>，→六期約 <strong>10 分鐘</strong>。
      </div>

      <div class="sec-title">🚌 即將發車（從行政大樓出發）</div>
      <div id="upcoming-wrap">${renderUpcoming(curMin, HOLIDAY_ROUTES)}</div>

      <div class="sec-title">⬇️ 下山公車預估時間</div>
      <div class="tab-bar">
        <button class="tab-btn ${selDownStop==='好漢坡'?'active':''}"
                onclick="selStop('好漢坡')">好漢坡</button>
        <button class="tab-btn ${selDownStop==='山居學習中心'?'active':''}"
                onclick="selStop('山居學習中心')">山居學習中心</button>
      </div>
      <div class="info-box">
        ℹ️ 每班公車到達<strong>山上終點站後即返回行政大樓</strong>。<br>
        下方顯示各班返程從終點出發時間，以及預計抵達你所在站的時間。<br>
        時間為估算值，建議<strong>稍早到站候車</strong>。
      </div>
      <div id="downhill-wrap">${renderDownhill(curMin, selDownStop, HOLIDAY_ROUTES)}</div>

      <div class="sec-title">📋 假日完整時刻表</div>
      ${renderHolidaySchedule(curMin)}

      <div class="sec-title">🗺️ 路線說明（假日）</div>
      ${renderHolidayLegend()}
    `;
  } else {
    // ── WEEKDAY LAYOUT ──
    main.innerHTML = `
      <div class="tip-box">
        💡 <strong>候車小提示：</strong>建議在發車時間<strong>前即抵達候車</strong>，
        以免錯過班次。<br>
        &nbsp;&nbsp;&nbsp;一路：行政大樓→好漢坡約 <strong>3 分鐘</strong>。<br>
        &nbsp;&nbsp;&nbsp;二、三路：行政大樓→山居學習中心約 <strong>5 分鐘</strong>。
      </div>

      <div class="sec-title">🚌 即將發車（從行政大樓出發）</div>
      <div id="upcoming-wrap">${renderUpcoming(curMin)}</div>

      <div class="sec-title">⬇️ 下山公車預估時間</div>
      <div class="tab-bar">
        <button class="tab-btn ${selDownStop==='好漢坡'?'active':''}"
                onclick="selStop('好漢坡')">好漢坡</button>
        <button class="tab-btn ${selDownStop==='山居學習中心'?'active':''}"
                onclick="selStop('山居學習中心')">山居學習中心</button>
      </div>
      <div class="info-box">
        ℹ️ 每班公車到達<strong>山上終點站後即返回行政大樓</strong>。<br>
        下方顯示各班返程從終點出發時間，以及預計抵達你所在站的時間。<br>
        時間為估算值，建議<strong>稍早到站候車</strong>。
      </div>
      <div id="downhill-wrap">${renderDownhill(curMin, selDownStop)}</div>

      <div class="sec-title">📋 完整時刻表</div>
      ${renderFullSchedule(curMin)}

      <div class="sec-title">🗺️ 路線說明</div>
      ${renderLegend()}
    `;
  }
}

function togSched(id) {
  const body = document.getElementById(`body-${id}`);
  const tog  = document.getElementById(`tog-${id}`);
  body.classList.toggle('open');
  tog.classList.toggle('open');
}

function selStop(stop) {
  selDownStop = stop;
  const tw  = getTW();
  const rIds = !isWeekday(tw) ? ['rh2','rh3'] : ['r1','r2','r3'];
  document.getElementById('downhill-wrap').innerHTML = renderDownhill(toMin(tw), stop, rIds);
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === stop);
  });
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
render(); // first load

// Clock ticks every second
setInterval(() => {
  const tw = getTW();
  const hh = String(tw.getHours()).padStart(2,'0');
  const mm = String(tw.getMinutes()).padStart(2,'0');
  const ss = String(tw.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
}, 1000);

// Full re-render every 60 seconds
setInterval(() => { initRender = true; render(); }, 60000);
</script>
</body>
</html>
