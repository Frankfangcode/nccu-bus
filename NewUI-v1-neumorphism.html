<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>政大校園公車即時資訊｜黑白簡約版</title>
  <style>
    /* ═══════════════════════════════════════════
       NEUMORPHISM (浮雕) DESIGN SYSTEM
    ═══════════════════════════════════════════ */
    :root {
      --r1:    #111111;
      --r2:    #2d2d2d;
      --r3:    #555555;
      --warn:  #2f2f2f;
      --danger:#111111;
      --bg:    #e6e6e6;
      --panel: #e9e9e9;
      --text:  #171717;
      --text-soft: #4b4b4b;
      --text-faint: #767676;
      --line: #d0d0d0;
      --line-strong: #222222;

      --shadow:    12px 12px 28px #c9c9c9, -12px -12px 28px #ffffff;
      --shadow-sm: 7px 7px 16px #d0d0d0, -7px -7px 16px #ffffff;
      --inset:     inset 4px 4px 9px #d0d0d0, inset -4px -4px 9px #ffffff;
      --soft-fill: linear-gradient(145deg, #ececec, #dfdfdf);

      --clay-radius: 18px;
      --clay-border: none;
      --clay-shadow:    var(--shadow);
      --clay-shadow-sm: var(--shadow-sm);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      background: transparent;
      color: var(--text);
      padding: 10px 10px 28px;
      text-align: center;
      box-shadow: none;
      position: relative;
      border-bottom: none;
    }
    header::before, header::after { display: none; }
    .header-inner {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 24px 20px;
      border-radius: 24px;
      background: var(--soft-fill);
      box-shadow: var(--shadow);
    }
    .header-logo  { font-size: .85rem; letter-spacing: .12em; opacity: .6; margin-bottom: 4px; }
    .header-title { font-size: 1.4rem; font-weight: 800; letter-spacing: .04em; }
    .clock {
      font-size: 3.2rem; font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: .02em;
      margin: 10px auto 4px;
      display: inline-block;
      padding: 10px 28px;
      border-radius: 20px;
      color: var(--text);
      background: var(--soft-fill);
      border: none;
      box-shadow: var(--shadow-sm);
    }
    .date-str { font-size: .86rem; opacity: .7; font-weight: 500; }
    .school-pill {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px; padding: 6px 18px;
      border-radius: 999px;
      font-size: .8rem; font-weight: 700;
      background: var(--soft-fill);
      color: var(--text);
      border: none;
      box-shadow: var(--shadow-sm);
    }
    .pill-on  { color: var(--text); }
    .pill-off { color: var(--text-faint); }

    /* ── LAYOUT ─────────────────────────────── */
    main { max-width: 640px; margin: 0 auto; padding: 16px; }

    /* ── CLAY CARD BASE ─────────────────────── */
    .clay-card {
      border-radius: var(--clay-radius);
      box-shadow: var(--shadow);
      background: var(--soft-fill);
    }

    /* ── SECTION TITLE ──────────────────────── */
    .sec-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 1rem; font-weight: 800;
      color: var(--text);
      margin: 24px 0 12px;
    }
    .sec-title::after {
      content: ''; flex: 1; height: 2px;
      background: linear-gradient(to right, rgba(0,0,0,0.18), transparent);
      border-radius: 999px;
    }

    /* ── TIP BOX ────────────────────────────── */
    .tip-box {
      border-radius: var(--clay-radius);
      box-shadow: var(--shadow-sm);
      padding: 14px 16px;
      font-size: .85rem;
      line-height: 1.65;
      margin-bottom: 20px;
      font-weight: 500;
      background: var(--soft-fill) !important;
      color: var(--text-soft) !important;
      border: none !important;
      box-shadow: var(--shadow-sm) !important;
      position: relative;
      overflow: hidden;
    }
    .tip-box strong { font-weight: 800; }

    /* ── NEXT BANNER ────────────────────────── */
    .next-banner {
      background: var(--soft-fill);
      box-shadow: var(--shadow-sm);
      border-radius: 12px;
      padding: 8px 14px;
      font-size: .82rem; font-weight: 800;
      color: var(--text);
      text-align: center;
      margin-bottom: 12px;
    }

    /* ── BUS CARD ───────────────────────────── */
    .bus-card {
      border-radius: var(--clay-radius);
      box-shadow: var(--shadow);
      background: var(--soft-fill);
      margin-bottom: 14px;
      overflow: hidden;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
      border: none;
    }
    .bus-card:hover { transform: translateY(-4px); }
    .bus-card.next-up {
      box-shadow: 14px 14px 30px #c8c8c8, -14px -14px 30px #ffffff, inset 0 0 0 1px rgba(17,17,17,0.08);
    }
    .bus-accent { height: 5px; border-radius: 0; }
    .card-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 16px 10px;
    }
    .route-badge {
      display: inline-flex; align-items: center;
      padding: 4px 12px; border-radius: 999px;
      font-size: .78rem; font-weight: 800;
      color: #fff;
      box-shadow: 5px 5px 12px rgba(0,0,0,0.12), -3px -3px 8px rgba(255,255,255,0.25);
    }
    .route-name { font-size: .78rem; color: var(--text-faint); margin-top: 4px; font-weight: 600; }
    .dep-block  { text-align: right; }
    .dep-time {
      font-size: 2.1rem; font-weight: 900;
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .countdown {
      font-size: .78rem; color: var(--text-faint);
      margin-top: 3px;
      font-variant-numeric: tabular-nums; font-weight: 600;
    }
    .cd-urgent { color: var(--text); font-weight: 800; }
    .cd-soon   { color: var(--text-soft); font-weight: 700; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── STOP TIMELINE ──────────────────────── */
    .stops-wrap { padding: 0 16px 14px; }
    .stop-row { display: flex; align-items: stretch; gap: 10px; }
    .stop-spine {
      display: flex; flex-direction: column; align-items: center;
      width: 16px; flex-shrink: 0;
    }
    .stop-dot {
      width: 13px; height: 13px;
      border-radius: 50%;
      border: 2px solid #d6d6d6;
      background: var(--soft-fill); flex-shrink: 0;
      box-shadow: 3px 3px 6px #d1d1d1, -2px -2px 5px #ffffff;
    }
    .dot-start { border-color: var(--line-strong); background: var(--line-strong); }
    .dot-end   { border-color: currentColor; }
    .spine-line { flex: 1; width: 2px; background: rgba(0,0,0,0.1); margin: 2px 0; min-height: 8px; }
    .stop-info {
      flex: 1; display: flex;
      justify-content: space-between; align-items: center;
      padding: 1px 0 8px;
    }
    .stop-name-txt { font-size: .83rem; font-weight: 500; }
    .stop-name-txt.bold { font-weight: 800; }
    .stop-eta-txt { font-size: .78rem; color: var(--text-faint); font-variant-numeric: tabular-nums; font-weight: 600; }

    /* ── TABS ───────────────────────────────── */
    .tab-bar {
      display: flex; gap: 4px;
      background: var(--soft-fill);
      border-radius: 14px; padding: 4px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
      border: none;
    }
    .tab-btn {
      flex: 1; padding: 9px 4px;
      border: none;
      background: none; border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: .88rem; font-weight: 700;
      color: var(--text-faint);
      transition: all .2s;
    }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .tab-btn.active {
      background: linear-gradient(145deg, #dfdfdf, #f0f0f0);
      color: var(--text); font-weight: 800;
      box-shadow: var(--inset);
    }
    .tab-btn:focus-visible { outline: 3px solid var(--line-strong); outline-offset: 2px; }

    /* ── INFO BOX ───────────────────────────── */
    .info-box {
      background: var(--soft-fill);
      box-shadow: var(--shadow-sm);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: .82rem; color: var(--text-soft);
      margin-bottom: 12px;
      line-height: 1.6; font-weight: 500;
      border: none;
    }

    /* ── SCHEDULE ACCORDION ─────────────────── */
    .sched-card {
      border-radius: var(--clay-radius);
      box-shadow: var(--shadow);
      background: var(--soft-fill);
      margin-bottom: 12px; overflow: hidden;
      border: none;
    }
    .sched-head {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      cursor: pointer; user-select: none;
      transition: background .15s;
    }
    .sched-head:hover { background: rgba(0,0,0,0.02); }
    .sched-meta { flex: 1; }
    .sched-dest  { font-size: .9rem; font-weight: 800; color: var(--text); }
    .sched-hours { font-size: .73rem; color: var(--text-faint); margin-top: 2px; font-weight: 600; }
    .sched-toggle {
      font-size: .85rem; color: var(--text-faint);
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      border: none;
      background: var(--soft-fill);
    }
    .sched-toggle.open { transform: rotate(180deg); }
    .sched-body { padding: 0 16px 16px; display: none; }
    .sched-body.open { display: block; }
    .sched-note {
      font-size: .78rem; color: var(--text-soft);
      margin-bottom: 10px; padding: 8px 12px;
      background: rgba(0,0,0,0.03);
      border-radius: 10px;
      line-height: 1.6;
      box-shadow: var(--inset);
    }

    /* ── TIME CHIPS ─────────────────────────── */
    .time-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .t-chip {
      padding: 5px 10px; border-radius: 10px;
      font-size: .78rem; font-variant-numeric: tabular-nums;
      color: var(--text); background: var(--soft-fill);
      font-weight: 600;
      box-shadow: 2px 2px 5px #d4d4d4, -1px -1px 4px #ffffff;
      border: none;
      transition: transform .15s;
    }
    .t-chip:hover { transform: translateY(-1px); }
    .t-chip.past { color: var(--text-faint); box-shadow: var(--inset); }
    .t-chip.nxt  {
      background: linear-gradient(145deg, #dcdcdc, #f3f3f3);
      color: var(--text); font-weight: 800;
      box-shadow: var(--inset);
      transform: scale(1.08);
    }
    .t-chip.eve  {
      box-shadow: 4px 4px 10px #d3d3d3, -4px -4px 10px #ffffff, inset 0 0 0 1px rgba(17,17,17,0.08);
    }

    .t-chip-yellow {
      padding: 5px 10px; border-radius: 10px;
      font-size: .78rem; font-variant-numeric: tabular-nums;
      color: var(--text); background: linear-gradient(145deg, #dddddd, #efefef);
      font-weight: 600;
      box-shadow: 2px 2px 5px #d4d4d4, -1px -1px 4px #ffffff;
      border: none;
      transition: transform .15s;
    }
    .t-chip-yellow:hover { transform: translateY(-1px); }
    .t-chip-yellow.nxt  {
      background: linear-gradient(145deg, #d7d7d7, #f2f2f2);
      color: var(--text); font-weight: 800;
      box-shadow: var(--inset); transform: scale(1.08);
    }
    .t-chip-yellow.past { color: var(--text-faint); box-shadow: var(--inset); }

    /* ── LEGEND ─────────────────────────────── */
    .legend {
      border-radius: var(--clay-radius);
      box-shadow: var(--shadow);
      background: var(--soft-fill);
      padding: 16px; margin-bottom: 12px;
      border: none;
    }
    .leg-row {
      display: flex; align-items: flex-start; gap: 12px;
      margin-bottom: 12px; padding-bottom: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .leg-row:last-child { margin: 0; padding: 0; border: none; }
    .leg-badge {
      padding: 4px 12px; border-radius: 999px;
      font-size: .76rem; font-weight: 800; color: #fff;
      white-space: nowrap;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.15);
      flex-shrink: 0;
    }
    .leg-info { font-size: .82rem; color: var(--text-soft); line-height: 1.55; }
    .leg-stops { font-size: .75rem; color: var(--text-faint); margin-top: 3px; }

    /* ── NO SERVICE ─────────────────────────── */
    .no-svc {
      text-align: center; padding: 48px 20px;
      background: var(--soft-fill);
      border-radius: var(--clay-radius);
      box-shadow: var(--shadow);
      color: var(--text-faint);
      border: none;
    }
    .no-svc .ttl { font-size: 1.1rem; font-weight: 800; color: var(--text); margin: 0 0 6px; }
    .no-svc .sub { font-size: .85rem; line-height: 1.55; }

    /* ── FOOTER ─────────────────────────────── */
    footer {
      text-align: center; padding: 28px 16px;
      color: var(--text-faint); font-size: .75rem; line-height: 1.9;
      max-width: 640px; margin: 0 auto;
    }

    .dark-frame {
      position: relative;
      background: var(--soft-fill);
      box-shadow: var(--shadow-sm), inset 1px 1px 2px rgba(255,255,255,0.8), inset -1px -1px 2px rgba(0,0,0,0.05);
      padding-left: 28px;
    }

    .dark-frame::before {
      content: '';
      position: absolute;
      top: 12px;
      bottom: 12px;
      left: 10px;
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, #111111, #5f5f5f);
      box-shadow: 2px 2px 4px rgba(0,0,0,0.12), -1px -1px 2px rgba(255,255,255,0.35);
    }

    .here-tag {
      font-size: .68rem;
      background: linear-gradient(145deg, #303030, #171717);
      color: #fff;
      border-radius: 999px;
      padding: 2px 8px;
      margin-left: 5px;
      vertical-align: middle;
      font-weight: 800;
      box-shadow: 4px 4px 8px rgba(0,0,0,0.16), -2px -2px 5px rgba(255,255,255,0.18);
    }

    .term-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.03);
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 10px;
      font-size: .8rem;
      color: var(--text-soft);
      box-shadow: var(--inset);
    }

    .meta-note {
      font-size: .7rem;
      color: var(--text-faint);
      padding: 8px 16px 10px;
      border-top: 1px solid rgba(0,0,0,0.06);
      margin-top: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      .bus-card, .tab-btn, .t-chip, .t-chip-yellow { transition: none; }
    }
  </style>
</head>

      { name:'百年樓',       off:1 },
      { name:'藝文中心',     off:2 },
      { name:'好漢坡',       off:3 },
      { name:'自強一二三舍', off:4 },
      { name:'山居學習中心', off:5 },
    ],
    terminus: '山居學習中心',
    terminusArrOff: 5,
    terminusDepOff: 7,
    downAt: { '山居學習中心': 7, '好漢坡': 9 },
    returnStops: [
      { name:'山居學習中心', off:0 },
      { name:'好漢坡',       off:2 },
      { name:'藝文中心',     off:3 },
      { name:'百年樓',       off:4 },
      { name:'行政大樓',     off:5 },
    ],
  },
};

function genR1() {
  const peaks = [
    [7*60+45, 8*60+15],  [8*60+45, 9*60+15],
    [9*60+45,10*60+15],  [10*60+45,11*60+15],
    [11*60+45,12*60+15], [12*60+45,13*60+15],
    [13*60+45,14*60+15], [14*60+45,15*60+15],
    [15*60+45,16*60+15], [16*60+45,17*60+15],
  ];
  const inPeak = t => peaks.some(([s,e]) => t>=s && t<e);
  const out = [];
  let t = 7*60+30;
  while (t <= 17*60+55) { out.push(t); t += inPeak(t) ? 5 : 8; }
  return out;
}

function genR2() {
  return [
    7*60+30, 7*60+50,
    8*60+20, 8*60+40,
    9*60+20, 9*60+50,
    10*60+20,10*60+50,
    11*60+20,11*60+50,
    12*60+20,
    13*60+20,13*60+50,
    14*60+20,14*60+50,
    15*60+20,15*60+50,
    16*60+20,16*60+50,
    17*60+20,17*60+50,
    18*60+10,
    19*60+10,
    20*60+10,
    21*60+30,
  ];
}

function genR3() {
  const fixed = [
    8*60+10,
    9*60+30,
    10*60+10,10*60+30,
    11*60+10,11*60+30,
    12*60+10,
    13*60+10,13*60+30,
    14*60+10,14*60+30,
    15*60+10,15*60+30,
    16*60+30,
    17*60+10,17*60+30,
  ];
  const eve8=[], eve10=[], eve15=[];
  for (let t=18*60;  t<19*60;  t+=8 ) eve8.push(t);
  for (let t=19*60;  t<20*60;  t+=10) eve10.push(t);
  for (let t=20*60;  t<=23*60; t+=15) eve15.push(t);
  return [...new Set([...fixed,...eve8,...eve10,...eve15])].sort((a,b)=>a-b);
}

function genHoliday() {
  return [
    8*60,     8*60+20,  8*60+40,
    9*60,     9*60+20,  9*60+40,
    10*60,    10*60+20, 10*60+40, 11*60, 11*60+20,
    12*60,    12*60+20, 12*60+40,
    13*60,    13*60+20, 13*60+40,
    14*60,    14*60+20, 14*60+40,
    15*60,    15*60+20, 15*60+40,
    16*60,    16*60+20, 16*60+40, 17*60, 17*60+20,
    18*60,    18*60+20, 18*60+40,
    19*60,    19*60+20, 19*60+40,
    20*60,    20*60+20, 20*60+40,
    21*60,    21*60+20, 21*60+40,
    22*60,    22*60+15, 22*60+30, 22*60+45, 23*60,
  ];
}
function isHolidayYellow(t) { return t % 60 === 0 && t >= 8*60 && t <= 18*60; }
const ALL_HOLIDAY = genHoliday();

const DEPARTURES = {
  r1:  genR1(),
  r2:  genR2(),
  r3:  genR3(),
  rh2: ALL_HOLIDAY.filter(t =>  isHolidayYellow(t)),
  rh3: ALL_HOLIDAY.filter(t => !isHolidayYellow(t)),
};

const R3_EVENING_START = 18*60;

function getTW() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset()*60000;
  return new Date(utc + 8*3600000);
}
function toMin(tw) { return tw.getHours()*60 + tw.getMinutes(); }
function fmt(m) {
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}
function isWeekday(tw) { const d=tw.getDay(); return d>=1&&d<=5; }
function fmtDate(tw) {
  const days=['日','一','二','三','四','五','六'];
  return `${tw.getFullYear()}年${tw.getMonth()+1}月${tw.getDate()}日　星期${days[tw.getDay()]}`;
}
function cdClass(diff) {
  if (diff<=2) return 'cd-urgent';
  if (diff<=8) return 'cd-soon';
  return '';
}
function cdText(diff) {
  if (diff<=0) return '即將發車';
  return `${diff} 分鐘後發車`;
}

function styleAttr(...rules) {
  const css = rules.filter(Boolean).join(';');
  return css ? `style="${css}"` : '';
}

function renderStops(stops, depMin, routeColor) {
  return stops.map((s, i) => {
    const isFirst = i===0, isLast = i===stops.length-1;
    const etaMin = depMin + s.off;
    const dotCls = isFirst ? 'stop-dot dot-start'
                 : isLast  ? 'stop-dot dot-end'
                 : 'stop-dot';
    const dotStyle = styleAttr(isLast && `border-color:${routeColor}`, isLast && `color:${routeColor}`);
    const lineHtml = isLast ? '' : '<div class="spine-line"></div>';
    const bold = isLast ? ' bold' : '';
    return `
      <div class="stop-row">
        <div class="stop-spine">
          <div class="${dotCls}" ${dotStyle}></div>
          ${lineHtml}
        </div>
        <div class="stop-info">
          <span class="stop-name-txt${bold}">${s.name}</span>
          <span class="stop-eta-txt">${fmt(etaMin)}</span>
        </div>
      </div>`;
  }).join('');
}

function busCard(routeId, depMin, curMin, isNextBus) {
  const r = ROUTES[routeId];
  const diff = depMin - curMin;
  const nextCls = isNextBus ? ' next-up' : '';
  return `
    <div class="bus-card${nextCls}">
      <div class="bus-accent" style="background:${r.color};"></div>
      <div class="card-top">
        <div>
          <span class="route-badge" style="background:${r.color};">${r.badge}</span>
          <div class="route-name">往 ${r.dest}</div>
        </div>
        <div class="dep-block">
          <div class="dep-time" style="color:${r.color};">${fmt(depMin)}</div>
          <div class="countdown ${cdClass(diff)}">${cdText(diff)}</div>
        </div>
      </div>
      <div class="stops-wrap">
        ${renderStops(r.stops, depMin, r.color)}
      </div>
    </div>`;
}

function renderUpcoming(curMin, routeIds) {
  routeIds = routeIds || ['r1','r2','r3'];
  const all = [];
  routeIds.forEach(id => {
    const r = ROUTES[id];
    DEPARTURES[id].filter(t => t>=curMin && t<=r.svcEnd)
      .slice(0, 3)
      .forEach(t => all.push({ id, t }));
  });
  all.sort((a,b)=>a.t-b.t);
  const shown = all.slice(0, 6);

  if (!shown.length) return `
    <div class="no-svc">
      <div class="ttl">今日班次已結束</div>
      <div class="sub">公車服務結束，明天上課日再見！</div>
    </div>`;

  const firstT = shown[0].t;
  const diff0  = firstT - curMin;
  const bannerHtml = `
    <div class="next-banner">
      下一班：${ROUTES[shown[0].id].badge} ${fmt(firstT)}
      ${diff0<=0 ? '（即將發車！）' : `· 還有 ${diff0} 分鐘`}
    </div>`;

  return bannerHtml + shown.map((b, i) =>
    busCard(b.id, b.t, curMin, i===0)
  ).join('');
}

function renderDownhill(curMin, selectedStop, routeIds) {
  routeIds = routeIds || ['r1','r2','r3'];
  const buses = [];
  routeIds.forEach(id => {
    const r = ROUTES[id];
    if (r.downAt[selectedStop] === undefined) return;
    DEPARTURES[id].filter(depT => depT <= r.svcEnd).forEach(depT => {
      const terminusDepT = depT + r.terminusDepOff;
      const passT        = depT + r.downAt[selectedStop];
      if (passT >= curMin) {
        buses.push({ id, r, depT, terminusDepT, passT });
      }
    });
  });
  buses.sort((a,b) => a.passT - b.passT);
  const shown = buses.slice(0, 5);

  if (!shown.length) return `
    <div style="text-align:center;padding:24px;color:#767676;font-size:.85rem;font-weight:600;">
      目前無下山班次估算資料
    </div>`;

  return shown.map(b => {
    const diff = b.passT - curMin;
    const isSameTerminus = (b.r.terminus === selectedStop);

    const stopsHtml = b.r.returnStops.map((s, i) => {
      const isFirst = i === 0, isLast = i === b.r.returnStops.length - 1;
      const isHere  = s.name === selectedStop;
      const etaMin  = b.terminusDepT + s.off;
      const dotCls  = isFirst ? 'stop-dot dot-start' : isLast ? 'stop-dot dot-end' : 'stop-dot';
      const dotStyle = styleAttr(
        isLast && `border-color:${b.r.color}`,
        isLast && `color:${b.r.color}`,
        isHere && `border-color:${b.r.color}`,
        isHere && `background:${b.r.color}`,
        isHere && 'box-shadow:0 0 0 3px rgba(0,0,0,0.08)'
      );
      const lineHtml = isLast ? '' : '<div class="spine-line"></div>';
      const hereTag  = isHere && !isSameTerminus
        ? '<span class="here-tag">你在這</span>'
        : '';
      const nameBold = (isHere || isLast) ? ' bold' : '';
      return `
        <div class="stop-row">
          <div class="stop-spine">
            <div class="${dotCls}" ${dotStyle}></div>
            ${lineHtml}
          </div>
          <div class="stop-info">
            <span class="stop-name-txt${nameBold}">${s.name}${hereTag}</span>
            <span class="stop-eta-txt" ${styleAttr(isHere && `color:${b.r.color}`, isHere && 'font-weight:800')}>${fmt(etaMin)}</span>
          </div>
        </div>`;
    }).join('');

    const termBanner = `
      <div class="term-banner dark-frame">
        <span style="font-size:1rem;font-weight:800;">返程</span>
        <span>從 <strong>${b.r.terminus}</strong>
          <span ${styleAttr(`color:${b.r.color}`, 'font-weight:800', 'margin-left:4px')}>${fmt(b.terminusDepT)}</span>
          出發返回
        </span>
      </div>`;

    return `
      <div class="bus-card">
        <div class="bus-accent" style="background:${b.r.color};"></div>
        <div class="card-top">
          <div>
            <span class="route-badge" style="background:${b.r.color};">${b.r.badge}</span>
            <div class="route-name">返程下山 · 往行政大樓</div>
          </div>
          <div class="dep-block">
            <div class="dep-time" style="color:${b.r.color};">${fmt(b.passT)}</div>
            <div class="countdown ${cdClass(diff)}">
              ${diff<=0 ? '即將抵達' : `${diff} 分鐘後抵達`}
            </div>
          </div>
        </div>
        <div class="stops-wrap">
          ${termBanner}${stopsHtml}
        </div>
        <div class="meta-note">
          依 ${fmt(b.depT)} 行政大樓發車 → ${b.r.terminus} ${fmt(b.terminusDepT)} 出發返回（估算）
        </div>
      </div>`;
  }).join('');
}

function renderFullSchedule(curMin) {
  return ['r1','r2','r3'].map(id => {
    const r = ROUTES[id];
    const times = DEPARTURES[id];
    const chipsHtml = times.map(t => {
      let cls = 't-chip';
      if (t < curMin - 3)               cls += ' past';
      else if (t>=curMin && t<=curMin+2) cls += ' nxt';
      else if (id==='r3' && t>=R3_EVENING_START) cls += ' eve';
      return `<span class="${cls}">${fmt(t)}</span>`;
    }).join('');

    return `
      <div class="sched-card">
        <div class="sched-head" onclick="togSched('${id}')">
          <span class="route-badge" style="background:${r.color};">${r.badge}</span>
          <div class="sched-meta">
            <div class="sched-dest">往 ${r.dest}</div>
            <div class="sched-hours">${r.svcHours}</div>
          </div>
          <span class="sched-toggle" id="tog-${id}">▼</span>
        </div>
        <div class="sched-body" id="body-${id}">
          <div class="sched-note">${r.note}</div>
          <div class="time-grid">${chipsHtml}</div>
          ${id==='r3' ? '<div style="margin-top:8px;font-size:.72rem;color:#767676;">深色外框 = 晚間密集班次</div>' : ''}
        </div>
      </div>`;
  }).join('');
}

function renderHolidaySchedule(curMin) {
  const chipsHtml = ALL_HOLIDAY.map(t => {
    const isYellow = isHolidayYellow(t);
    let cls = isYellow ? 't-chip t-chip-yellow' : 't-chip';
    if (t < curMin - 3)               cls += ' past';
    else if (t>=curMin && t<=curMin+2) cls = (isYellow ? 't-chip-yellow' : 't-chip') + ' nxt';
    const suffix = isYellow ? ' ★' : '';
    return `<span class="${cls}" title="${isYellow?'黃底班次：往六期運動場':'往山居學習中心'}">${fmt(t)}${suffix}</span>`;
  }).join('');

  return `
    <div class="sched-card">
      <div class="sched-head" onclick="togSched('holiday')">
        <span class="route-badge" style="background:#6a6a6a;">假日公車</span>
        <div class="sched-meta">
          <div class="sched-dest">行政大樓出發完整班次</div>
          <div class="sched-hours">週六、日及國定假日 08:00 – 23:00</div>
        </div>
        <span class="sched-toggle" id="tog-holiday">▼</span>
      </div>
      <div class="sched-body" id="body-holiday">
        <div class="sched-note dark-frame">
          <strong>深色★</strong>：整點班次（08:00–18:00），延伸至六期運動場<br>
          淺灰班次：至山居學習中心後返回
        </div>
        <div class="time-grid">${chipsHtml}</div>
      </div>
    </div>`;
}

function renderHolidayLegend() {
  return `
    <div class="legend">
      <div class="leg-row">
        <span class="leg-badge" style="background:#1f1f1f;">假日公車★</span>
        <div class="leg-info">
          <div>行政大樓 → 百年樓 → 藝文中心 → 好漢坡 → 自強一二三舍 → 山居學習中心 → 自強十舍 → 研創中心 → 六期運動場</div>
          <div class="leg-stops">整點發車 08:00–18:00 ｜ 返程不經山居學習中心、自強十舍</div>
        </div>
      </div>
      <div class="leg-row">
        <span class="leg-badge" style="background:#6a6a6a;">假日公車</span>
        <div class="leg-info">
          <div>行政大樓 → 百年樓 → 藝文中心 → 好漢坡 → 自強一二三舍 → 山居學習中心</div>
          <div class="leg-stops">非整點班次 08:20–23:00 ｜ 假日公車服務：週六、日及國定假日</div>
        </div>
      </div>
    </div>`;
}

function renderLegend() {
  return `
    <div class="legend">
      ${['r1','r2','r3'].map(id => {
        const r = ROUTES[id];
        return `
          <div class="leg-row">
            <span class="leg-badge" style="background:${r.color};">${r.badge}</span>
            <div class="leg-info">
              <div>${r.routeDesc}</div>
              <div class="leg-stops">${r.svcHours} ｜ ${r.note}</div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

let selDownStop = '好漢坡';
let initRender  = true;

function render() {
  const tw     = getTW();
  const curMin = toMin(tw);
  const hh = String(tw.getHours()).padStart(2,'0');
  const mm = String(tw.getMinutes()).padStart(2,'0');
  const ss = String(tw.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
  document.getElementById('date-str').textContent = fmtDate(tw);
  const pill    = document.getElementById('school-pill');
  const weekend = !isWeekday(tw);
  if (!weekend) {
    pill.className   = 'school-pill pill-on';
    pill.textContent = '上課日　平日公車服務中';
  } else {
    pill.className   = 'school-pill pill-on';
    pill.textContent = '假日公車服務中　08:00–23:00';
  }
  if (!initRender) return;
  initRender = false;
  const main = document.getElementById('main');
  const HOLIDAY_ROUTES = ['rh2','rh3'];
  if (weekend) {
    main.innerHTML = `
      <div class="tip-box dark-frame">
        <strong>今日為假日班表（週六、日、國定假日）</strong><br>
        &nbsp;&nbsp;&nbsp;★ 整點班次（08:00–18:00）延伸至六期運動場，其餘至山居學習中心。<br>
        &nbsp;&nbsp;&nbsp;建議在發車時間<strong>前即抵達候車</strong>，以免錯過班次。<br>
        &nbsp;&nbsp;&nbsp;行政大樓→山居約 <strong>5 分鐘</strong>，→六期約 <strong>10 分鐘</strong>。
      </div>
      <div class="sec-title">即將發車（行政大樓出發）</div>
      <div id="upcoming-wrap">${renderUpcoming(curMin, HOLIDAY_ROUTES)}</div>
      <div class="sec-title">下山公車預估時間</div>
      <div class="tab-bar">
        <button class="tab-btn ${selDownStop==='好漢坡'?'active':''}" onclick="selStop('好漢坡')">好漢坡</button>
        <button class="tab-btn ${selDownStop==='山居學習中心'?'active':''}" onclick="selStop('山居學習中心')">山居學習中心</button>
      </div>
      <div class="info-box dark-frame">
        每班公車到達<strong>山上終點站後即返回行政大樓</strong>。<br>
        下方顯示各班返程從終點出發時間，以及預計抵達你所在站的時間。<br>
        時間為估算值，建議<strong>稍早到站候車</strong>。
      </div>
      <div id="downhill-wrap">${renderDownhill(curMin, selDownStop, HOLIDAY_ROUTES)}</div>
      <div class="sec-title">假日完整時刻表</div>
      ${renderHolidaySchedule(curMin)}
      <div class="sec-title">路線說明（假日）</div>
      ${renderHolidayLegend()}
    `;
  } else {
    main.innerHTML = `
      <div class="tip-box dark-frame">
        <strong>候車小提示：</strong>建議在發車時間<strong>前即抵達候車</strong>，以免錯過班次。<br>
        &nbsp;&nbsp;&nbsp;一路：行政大樓→好漢坡約 <strong>3 分鐘</strong>。<br>
        &nbsp;&nbsp;&nbsp;二、三路：行政大樓→山居學習中心約 <strong>5 分鐘</strong>。
      </div>
      <div class="sec-title">即將發車（行政大樓出發）</div>
      <div id="upcoming-wrap">${renderUpcoming(curMin)}</div>
      <div class="sec-title">下山公車預估時間</div>
      <div class="tab-bar">
        <button class="tab-btn ${selDownStop==='好漢坡'?'active':''}" onclick="selStop('好漢坡')">好漢坡</button>
        <button class="tab-btn ${selDownStop==='山居學習中心'?'active':''}" onclick="selStop('山居學習中心')">山居學習中心</button>
      </div>
      <div class="info-box dark-frame">
        每班公車到達<strong>山上終點站後即返回行政大樓</strong>。<br>
        下方顯示各班返程從終點出發時間，以及預計抵達你所在站的時間。<br>
        時間為估算值，建議<strong>稍早到站候車</strong>。
      </div>
      <div id="downhill-wrap">${renderDownhill(curMin, selDownStop)}</div>
      <div class="sec-title">完整時刻表</div>
      ${renderFullSchedule(curMin)}
      <div class="sec-title">路線說明</div>
      ${renderLegend()}
    `;
  }
}

function togSched(id) {
  document.getElementById(`body-${id}`).classList.toggle('open');
  document.getElementById(`tog-${id}`).classList.toggle('open');
}

function selStop(stop) {
  selDownStop = stop;
  const tw  = getTW();
  const rIds = !isWeekday(tw) ? ['rh2','rh3'] : ['r1','r2','r3'];
  document.getElementById('downhill-wrap').innerHTML =
    renderDownhill(toMin(tw), stop, rIds);
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === stop);
  });
}

render();
setInterval(() => {
  const tw = getTW();
  const hh = String(tw.getHours()).padStart(2,'0');
  const mm = String(tw.getMinutes()).padStart(2,'0');
  const ss = String(tw.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
}, 1000);
setInterval(() => { initRender = true; render(); }, 60000);
</script>
</body>
</html>
